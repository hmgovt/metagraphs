name: Snapshot

on:
  schedule:
    # Every 10 min — the orchestrator deduplicates by Yuma epoch
    # (~72 min) so this catches every epoch within ~10 min of resolution
    # while idle ticks exit before committing.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    name: Pull network snapshot and commit to data branch
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Switch to data branch (create from main on first run)
        run: |
          set -euo pipefail
          git config user.name 'metagraphs-bot'
          git config user.email 'bot@metagraphs.live'

          if git fetch origin data 2>/dev/null; then
            git switch -t origin/data 2>/dev/null || git switch data
            # Sync from main onto the data branch's working tree so the
            # pipeline always runs against current code AND validates
            # against current schema. The data branch only commits
            # artefacts (data/network.ndjson, static/network*.json) —
            # source paths synced here are reset every run and never
            # committed to data.
            git checkout main -- scripts/ static/network.schema.json
          else
            echo "::notice title=Bootstrap::data branch does not exist; creating from main."
            git switch -c data
          fi

      - name: Run snapshot pipeline
        env:
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: |
          set -euo pipefail
          npm run snapshot:fetch
          npm run snapshot:build
          npm run snapshot:validate

      - name: Commit and push
        id: commit
        run: |
          set -euo pipefail

          git add -- \
            data/network.ndjson \
            static/network.json \
            static/network-meta.json \
            static/network.schema.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "::notice title=No-op::Snapshot pipeline ran but no files changed (epoch dedup or identical pivot). Exiting clean."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EPOCH=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("static/network-meta.json","utf8")).epoch ?? "?")')
          BLOCK=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("static/network-meta.json","utf8")).block ?? "?")')
          STALE=$(node -e 'console.log(JSON.parse(require("fs").readFileSync("static/network-meta.json","utf8")).stale ? " (stale)" : "")')
          STAMP=$(date -u +%Y-%m-%dT%H:%MZ)

          git commit -m "chore(snap): epoch ${EPOCH} at ${STAMP}${STALE} (block ${BLOCK})"
          git push -u origin data
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr edge cache
        # The browser fetches network.json + network-meta.json from jsDelivr's
        # GitHub-branch CDN, which caches branch resources for 12 h by default.
        # Without an explicit purge, a fresh snapshot (or schema bump) can sit
        # behind a stale edge for hours. Gated on the commit step having
        # actually pushed — no-op runs leave the cache alone.
        if: steps.commit.outputs.pushed == 'true'
        run: |
          set -euo pipefail
          for path in static/network.json static/network-meta.json; do
            echo "Purging gh/hmgovt/metagraphs@data/${path}"
            curl -sS --fail --max-time 15 \
              "https://purge.jsdelivr.net/gh/hmgovt/metagraphs@data/${path}" \
              || echo "::warning title=Purge::jsDelivr purge for ${path} did not succeed (CDN will refresh on its own TTL)."
            echo
          done
